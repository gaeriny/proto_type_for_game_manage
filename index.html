<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>스포츠 통합 라인업 전술판</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <button id="tab-dashboard" class="active" onclick="switchView('dashboard')">📺 전체 대시보드</button>
    <button id="tab-manager" onclick="switchView('manager')">📋 감독 모드</button>
    <button id="tab-referee" onclick="switchView('referee')">📯 심판 모드</button>
  </nav>

  <div class="sports-selector">
    <button id="btn-sport-soccer" class="active" onclick="switchSport('soccer')">⚽ 축구 전술판</button>
    <button id="btn-sport-basketball" onclick="switchSport('basketball')">🏀 농구 풀코트</button>
  </div>

  <div class="container">
    <div id="view-dashboard" class="view-section active">
      <div class="dashboard-board">
        <div class="dash-teams"><span id="dash-home-name">HOME</span><span id="dash-away-name">AWAY</span></div>
        <div class="dash-score">
          <span id="dash-home-score">0</span>
          <div>:</div>
          <span id="dash-away-score">0</span>
        </div>
        <div class="dash-timer" id="dash-timer">15:00</div>
        <div id="dash-status" style="font-size:0.85rem; color:#aaa; margin-top:5px;">경기 대기 중</div>
      </div>
      <div class="box">
        <h2 id="dash-pitch-title">실시간 라인업 전술판 (축구)</h2>
        
        <div class="pitch-soccer" id="dash-soccer-pitch">
          <div class="soccer-center-circle"></div><div class="soccer-center-dot"></div>
          <div class="soccer-penalty-top"></div><div class="soccer-penalty-bottom"></div>
          <div class="soccer-goal-top"></div><div class="soccer-goal-bottom"></div>
        </div>

        <div class="pitch-basketball" id="dash-basketball-pitch" style="display: none;">
          <div class="bb-center-circle"></div>
          <div class="bb-key-top"></div><div class="bb-free-top"></div><div class="bb-line3-top"></div>
          <div class="bb-key-bottom"></div><div class="bb-free-bottom"></div><div class="bb-line3-bottom"></div>
        </div>
      </div>
    </div>

    <div id="view-manager" class="view-section">
      <div class="box">
        <h2>당일 출석 선수 즉석 등록</h2>
        <div class="input-group">
          <input type="number" id="p-number" placeholder="등번호">
          <input type="text" id="p-name" placeholder="선수 이름">
          <button class="btn-add" id="btn-add-player" onclick="handleNewPlayer()">등록</button>
        </div>
      </div>
      <div class="box">
        <h2 id="manager-pitch-title">라인업 전술 배치 (드래그)</h2>
        
        <div class="pitch-soccer" id="manager-soccer-pitch">
          <div class="soccer-center-circle"></div><div class="soccer-center-dot"></div>
          <div class="soccer-penalty-top"></div><div class="soccer-penalty-bottom"></div>
          <div class="soccer-goal-top"></div><div class="soccer-goal-bottom"></div>
        </div>

        <div class="pitch-basketball" id="manager-basketball-pitch" style="display: none;">
          <div class="bb-center-circle"></div>
          <div class="bb-key-top"></div><div class="bb-free-top"></div><div class="bb-line3-top"></div>
          <div class="bb-key-bottom"></div><div class="bb-free-bottom"></div><div class="bb-line3-bottom"></div>
        </div>

        <div style="font-weight: bold; margin: 15px 0 5px 0; color: #555; text-align: left;">📋 선수 대기석</div>
        <div class="bench" id="player-bench"></div>
      </div>
    </div>

    <div id="view-referee" class="view-section">
      <div class="box">
        <h2>스코어 & 타이머 제어</h2>
        
        <button class="btn-team-edit" onclick="changeTeamNames()">✏️ 팀 이름 설정</button>

        <div class="scoreboard">
          <div class="score-col">
            <span class="team-label" id="ref-home-name">HOME</span>
            <button class="score-btn" onclick="handleScore('home', 1)">+1</button>
            <div class="team-score-num" id="ref-home-score">0</div>
            <button class="score-btn" onclick="handleScore('home', -1)">-1</button>
          </div>
          <div class="score-vs">VS</div>
          <div class="score-col">
            <span class="team-label" id="ref-away-name">AWAY</span>
            <button class="score-btn" onclick="handleScore('away', 1)">+1</button>
            <div class="team-score-num" id="ref-away-score">0</div>
            <button class="score-btn" onclick="handleScore('away', -1)">-1</button>
          </div>
        </div>
        
        <div class="timer-wrap">
          <div class="timer-display" id="ref-timer">15:00</div>
          <div class="timer-modifiers">
            <button class="btn-mod" onclick="modifyTimer(60)">+1분</button>
            <button class="btn-mod" onclick="modifyTimer(-60)">-1분</button>
            <button class="btn-mod btn-reset" onclick="resetTimer()">🔄 초기화</button>
          </div>
          <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-main" id="start-btn" onclick="handleTimer()">경기 시작</button>
            <button class="btn btn-whistle" onclick="triggerWhistle()">휘슬 📯</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
